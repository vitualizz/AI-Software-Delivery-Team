schema_version: "1"
agent: ux-ui
change_id: add-user-auth
created_at: "2026-06-04T10:05:32Z"
prompt_version: "c7f9a14b"
input_refs:
  - .asdt/knowledge/platform.yaml
payload:
  feature_brief:
    name: User Authentication
    description: >
      Allow visitors to register with email and password, log in to access
      protected resources, and log out to invalidate their session.
    primary_actors:
      - New visitor (unauthenticated)
      - Registered user (authenticated)

  information_architecture:
    new_routes:
      - path: /register
        type: page
        title: Create Account
      - path: /login
        type: page
        title: Sign In
    protected_routes:
      - pattern: /dashboard/**
        redirect_to: /login

  user_flows:
    - id: UF-001
      name: Registration
      actor: new visitor
      steps:
        - Visit /register
        - Fill in email and password (minimum 8 characters)
        - Submit form
        - On success → redirect to /login with confirmation message
        - On duplicate email → inline error "Email already registered"
        - On weak password → inline error on password field

    - id: UF-002
      name: Login
      actor: registered user
      steps:
        - Visit /login
        - Enter email and password
        - Submit form
        - On success → redirect to /dashboard
        - On invalid credentials → generic error "Invalid email or password"
        - On locked account → error "Account temporarily locked, try again later"

    - id: UF-003
      name: Logout
      actor: authenticated user
      steps:
        - Click logout button (available in nav on all authenticated pages)
        - POST /auth/logout
        - Redirect to /login

  component_mapping:
    reuse:
      - name: FormField
        usage: email and password inputs on both register and login pages
      - name: Button
        usage: primary submit buttons
      - name: Alert
        usage: success and error message banners
    new:
      - name: AuthLayout
        description: Centered single-column layout for auth pages; no nav bar
      - name: PasswordStrengthIndicator
        description: Visual feedback on password strength for the registration form

  responsive_strategy:
    approach: >
      Auth pages are single-column on all viewports. No layout changes between
      mobile and desktop — the form is the entire page content.

  open_items: []
