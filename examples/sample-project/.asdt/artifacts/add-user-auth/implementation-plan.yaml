payload:
  approach: >
    Add user authentication as a self-contained internal/auth package with
    handler, model, store, and middleware layers. Use net/http standard library.
    bcrypt for password hashing, HMAC-SHA256 signed tokens for sessions stored
    in PostgreSQL. No external auth framework.
  steps:
    - story_id: US-001
      files_to_create:
        - internal/model/user.go
        - internal/store/user_store.go
        - internal/handler/register.go
        - migrations/001_create_users.sql
      files_to_modify:
        - cmd/api/main.go
      rationale: >
        Define the User domain model and database schema first. The registration
        handler validates input, hashes the password, persists the user, and
        returns 201. Duplicate email is caught by a unique constraint and
        returned as 409.
      code_snippets:
        - file: internal/model/user.go
          content: |
            type User struct {
                ID           int64     `db:"id"`
                Email        string    `db:"email"`
                PasswordHash string    `db:"password_hash"`
                CreatedAt    time.Time `db:"created_at"`
            }
        - file: internal/handler/register.go
          content: |
            func (h *Handler) Register(w http.ResponseWriter, r *http.Request) {
                var req RegisterRequest
                if err := json.NewDecoder(r.Body).Decode(&req); err != nil {
                    http.Error(w, "invalid request body", http.StatusBadRequest)
                    return
                }
                if err := validateRegisterRequest(req); err != nil {
                    http.Error(w, err.Error(), http.StatusBadRequest)
                    return
                }
                hash, err := bcrypt.GenerateFromPassword([]byte(req.Password), 12)
                if err != nil {
                    http.Error(w, "internal error", http.StatusInternalServerError)
                    return
                }
                if err := h.users.Create(r.Context(), req.Email, string(hash)); err != nil {
                    if errors.Is(err, store.ErrDuplicateEmail) {
                        http.Error(w, "email already registered", http.StatusConflict)
                        return
                    }
                    http.Error(w, "internal error", http.StatusInternalServerError)
                    return
                }
                w.WriteHeader(http.StatusCreated)
            }

    - story_id: US-002
      files_to_create:
        - internal/handler/login.go
        - internal/store/session_store.go
        - migrations/002_create_sessions.sql
      files_to_modify:
        - internal/handler/register.go
      rationale: >
        Session tokens are HMAC-SHA256 signed strings stored in a sessions table.
        Failed attempt counting is a column on the users table — simple, no
        separate table needed for MVP. Account lockout is checked before password
        verification.
      code_snippets:
        - file: internal/handler/login.go
          content: |
            func (h *Handler) Login(w http.ResponseWriter, r *http.Request) {
                var req LoginRequest
                if err := json.NewDecoder(r.Body).Decode(&req); err != nil {
                    http.Error(w, "invalid credentials", http.StatusUnauthorized)
                    return
                }
                user, err := h.users.FindByEmail(r.Context(), req.Email)
                if err != nil {
                    http.Error(w, "invalid credentials", http.StatusUnauthorized)
                    return
                }
                if user.LockedUntil.After(time.Now()) {
                    http.Error(w, "account temporarily locked", http.StatusTooManyRequests)
                    return
                }
                if err := bcrypt.CompareHashAndPassword([]byte(user.PasswordHash), []byte(req.Password)); err != nil {
                    h.users.IncrementFailedAttempts(r.Context(), user.ID)
                    http.Error(w, "invalid credentials", http.StatusUnauthorized)
                    return
                }
                token, err := h.sessions.Create(r.Context(), user.ID)
                if err != nil {
                    http.Error(w, "internal error", http.StatusInternalServerError)
                    return
                }
                http.SetCookie(w, &http.Cookie{
                    Name:     "session",
                    Value:    token,
                    HttpOnly: true,
                    Secure:   true,
                    MaxAge:   86400,
                })
                w.WriteHeader(http.StatusOK)
            }

    - story_id: US-003
      files_to_create:
        - internal/handler/logout.go
        - internal/middleware/auth.go
      files_to_modify:
        - cmd/api/main.go
      rationale: >
        Logout deletes the session row. The auth middleware validates the cookie
        on every protected route and injects the user ID into context. Both
        handler and middleware are thin — business logic lives in the store.
      code_snippets:
        - file: internal/middleware/auth.go
          content: |
            func Auth(sessions SessionStore) func(http.Handler) http.Handler {
                return func(next http.Handler) http.Handler {
                    return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
                        cookie, err := r.Cookie("session")
                        if err != nil || cookie.Value == "" {
                            http.Error(w, "unauthorized", http.StatusUnauthorized)
                            return
                        }
                        userID, err := sessions.Validate(r.Context(), cookie.Value)
                        if err != nil {
                            http.Error(w, "unauthorized", http.StatusUnauthorized)
                            return
                        }
                        ctx := context.WithValue(r.Context(), ctxKeyUserID, userID)
                        next.ServeHTTP(w, r.WithContext(ctx))
                    })
                }
            }
        - file: internal/handler/logout.go
          content: |
            func (h *Handler) Logout(w http.ResponseWriter, r *http.Request) {
                cookie, err := r.Cookie("session")
                if err == nil && cookie.Value != "" {
                    _ = h.sessions.Delete(r.Context(), cookie.Value)
                }
                http.SetCookie(w, &http.Cookie{
                    Name:   "session",
                    Value:  "",
                    MaxAge: -1,
                })
                w.WriteHeader(http.StatusOK)
            }

    - story_id: ""
      files_to_create:
