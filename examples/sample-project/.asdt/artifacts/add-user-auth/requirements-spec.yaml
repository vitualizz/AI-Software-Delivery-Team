schema_version: "1"
agent: requirements
change_id: add-user-auth
created_at: "2026-06-04T10:00:00Z"
prompt_version: "f3a8c21e"
input_refs:
  - .asdt/knowledge/platform.yaml
payload:
  user_stories:
    - id: US-001
      as: new visitor
      want: register with my email address and a password
      so_that: I can create an account and access the application
      acceptance_criteria:
        - Registration form accepts email and password (minimum 8 characters)
        - Email address must be unique; duplicate registration returns a clear error
        - Password is stored as a bcrypt hash, never in plaintext
        - A verification email is sent after successful registration
        - On success, the user is redirected to the login page

    - id: US-002
      as: registered user
      want: log in with my email and password
      so_that: I can access my account and protected resources
      acceptance_criteria:
        - Login accepts email and password
        - Invalid credentials return a generic error (do not reveal which field is wrong)
        - On success, a signed session token is issued with a 24-hour expiry
        - Session token is returned as an HTTP-only cookie
        - Three consecutive failed attempts lock the account for 15 minutes

    - id: US-003
      as: authenticated user
      want: log out of the application
      so_that: my session is invalidated and no one else can use my account on this device
      acceptance_criteria:
        - A POST /auth/logout endpoint invalidates the current session token
        - The session cookie is cleared in the response
        - Subsequent requests with the invalidated token return 401 Unauthorized
        - Logout always returns 200 OK even if the session was already expired

  scope:
    in:
      - User registration (email + password)
      - Email/password login
      - Session management (issue, validate, revoke)
      - Logout endpoint
    out:
      - OAuth / social login (Google, GitHub)
      - Two-factor authentication
      - "Remember me" persistent sessions
      - Account deletion
      - Password reset flow (separate change)

  nfrs:
    - Passwords must be hashed with bcrypt, cost factor >= 12
    - Session tokens must expire after 24 hours of inactivity
    - All auth endpoints must respond within 500ms at p99 under normal load
    - Login endpoint must be rate-limited to 10 requests per IP per minute

  open_questions:
    - Should failed login attempts be tracked per-IP, per-account, or both?
      (Current decision: per-account, with IP logging for audit purposes)
