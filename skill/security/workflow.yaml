specialist: security
steps:
  - name: knowledge-recall
    skill: ../_shared/skills/knowledge-recall.md
    description: Query organizational memory for prior security findings, threat models, and mitigations relevant to this change before acting

  - name: platform-analysis
    skill: ../_shared/skills/platform-context.md
    description: Load and inject platform conventions and architectural fingerprint from platform.yaml

  - name: threat-modeling
    skill: steps/threat-modeling.md
    description: Apply STRIDE threat modeling using platform summary and any available upstream artifacts

  - name: attack-surface
    skill: steps/attack-surface.md
    description: Map the attack surface from the identified STRIDE threats

  - name: owasp-analysis
    skill: steps/owasp-analysis.md
    description: Analyze the attack surface against OWASP Top 10 and applicable vulnerability classes

  - name: hardening-checklist
    skill: steps/hardening-checklist.md
    description: Produce the final security-findings + hardening-checklist artifacts with CVSS-lite severity ratings

  - name: decision-preservation
    skill: ../_shared/skills/decision-preservation.md
    description: Save a permanent organizational knowledge record of security findings and mitigations from this run
