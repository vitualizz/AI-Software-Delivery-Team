# DOCUMENTATION ONLY — This schema describes the expected structure of mem_save content.
# Artifacts are NOT written to the filesystem during specialist execution.
# Use mem_save with this structure as the content shape.
$schema: "http://json-schema.org/draft-07/schema#"
$id: "https://github.com/vitualizz/asdt/schemas/quality-report.schema.yaml"
title: QualityReport
description: >
  Payload produced by the QA specialist's quality-report step.
  Summarises AC gaps, missing infrastructure, and readiness for implementation.
  Persisted via mem_save to the memory provider (not written to .asdt/artifacts/).
type: object

required:
  - ac_gaps
  - readiness

properties:
  ac_gaps:
    type: array
    description: Acceptance criteria that are incomplete, untestable, or ambiguous.
    items:
      type: object
      required:
        - criterion
        - issue
      properties:
        criterion:
          type: string
        issue:
          type: string
        recommendation:
          type: string

  missing_infrastructure:
    type: array
    description: Test infrastructure that must be created before tests can run.
    items:
      type: string

  readiness:
    type: string
    description: Overall readiness assessment for implementation.
    enum:
      - ready
      - conditional
      - blocked

  readiness_notes:
    type: string
    description: Explanation of readiness decision.

  summary:
    type: string
    description: >
      One-sentence quality assessment for the organizational knowledge record.

  open_items:
    type: array
    description: Questions for the Developer or Architect before implementation begins.
    items:
      type: string
