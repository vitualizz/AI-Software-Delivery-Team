# DOCUMENTATION ONLY — This schema describes the expected structure of mem_save content.
# Artifacts are NOT written to the filesystem during specialist execution.
# Use mem_save with this structure as the content shape.
$schema: "http://json-schema.org/draft-07/schema#"
$id: "https://github.com/vitualizz/ai-software-delivery-team/schemas/platform-summary.schema.yaml"
title: PlatformSummary
description: >
  Deterministic platform summary derived from platform.yaml by `asdt init`.
  Persisted via mem_save to the memory provider (not written to .asdt/knowledge/).
  Used to avoid redundant platform-analysis calls by querying mem_search first.
type: object

required:
  - stack
  - primary_language

properties:
  stack:
    type: array
    description: Detected technology stack identifiers (e.g. [go, postgres, htmx]).
    items:
      type: string

  primary_language:
    type: string
    description: The dominant programming language (e.g. go, typescript, python).

  package_manager:
    type: string
    description: Detected package manager (e.g. go modules, npm, pip).

  test_runner:
    type: string
    description: Detected test runner command (e.g. go test, jest, pytest).

  key_patterns:
    type: array
    description: Architectural patterns detected (e.g. hexagonal, mvc, microservices).
    items:
      type: string

  naming_conventions:
    type: object
    description: Naming conventions extracted from the codebase.
    properties:
      packages:
        type: string
      files:
        type: string
      types:
        type: string

  detected_at:
    type: string
    format: date-time
    description: When this summary was last generated by asdt init.

  open_items:
    type: array
    items:
      type: string
