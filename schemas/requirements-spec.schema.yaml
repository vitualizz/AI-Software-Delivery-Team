# JSON Schema (draft-07) for the RequirementsSpec payload.
# Written by the Requirements Agent under .asdt/artifacts/{change}/requirements-spec.yaml
$schema: "http://json-schema.org/draft-07/schema#"
$id: "https://github.com/vitualizz/ai-software-delivery-team/schemas/requirements-spec.schema.yaml"
title: RequirementsSpec
description: >
  Payload produced by the Requirements Agent from a free-text idea.
  Carried inside an ArtifactEnvelope.
type: object

required:
  - user_stories
  - acceptance_criteria
  - scope
  - nfrs
  - open_questions

properties:
  user_stories:
    type: array
    description: >
      Ordered list of user stories derived from the idea.
      Every story MUST be traceable to words in the original idea.
    items:
      type: object
      required:
        - id
        - as
        - want
        - so_that
      properties:
        id:
          type: string
          description: Stable story identifier (e.g. US-001).
        as:
          type: string
          description: Role or persona that benefits from this story.
        want:
          type: string
          description: What the role wants to accomplish.
        so_that:
          type: string
          description: The business value or outcome.

  acceptance_criteria:
    type: object
    description: >
      Map from story_id to list of acceptance criteria strings.
    additionalProperties:
      type: array
      items:
        type: string

  scope:
    type: object
    description: >
      Explicit scope boundaries for the change.
    required:
      - in
      - out
    properties:
      in:
        type: array
        description: Capabilities and behaviors explicitly in scope.
        items:
          type: string
      out:
        type: array
        description: Capabilities and behaviors explicitly out of scope.
        items:
          type: string

  nfrs:
    type: array
    description: Non-functional requirements (performance, security, scalability, etc.).
    items:
      type: string

  open_questions:
    type: array
    description: >
      Unresolved questions that must be answered before implementation can proceed.
    items:
      type: string
