# DOCUMENTATION ONLY — This schema describes the expected structure of mem_save content.
# Artifacts are NOT written to the filesystem during specialist execution.
# Use mem_save with this structure as the content shape.
# Historical context: this was the ArtifactEnvelope header for filesystem YAML artifacts.
# With the org-knowledge change, artifacts are persisted via mem_save to the memory provider.
$schema: "http://json-schema.org/draft-07/schema#"
$id: "https://github.com/vitualizz/ai-software-delivery-team/schemas/envelope.schema.yaml"
title: ArtifactEnvelope
description: >
  Uniform header describing the structure of artifact content passed to mem_save.
  The payload field carries the agent-specific typed content.
type: object

required:
  - schema_version
  - agent
  - change_id
  - created_at
  - prompt_version
  - input_refs
  - payload

properties:
  schema_version:
    type: string
    description: >
      Version of this envelope schema. Consumers MUST fail loudly on mismatch.
    example: "1"

  agent:
    type: string
    description: >
      Name of the role that produced this artifact (e.g. requirements, developer, knowledge).
    minLength: 1

  change_id:
    type: string
    description: >
      Unique identifier for the change this artifact belongs to.
      Used to group all artifacts for a single delivery unit.
    minLength: 1

  created_at:
    type: string
    format: date-time
    description: >
      ISO 8601 timestamp of when this artifact was written.

  prompt_version:
    type: string
    description: >
      SHA-256 truncated hash of the composed-prompt manifest used to produce this artifact.
      Enables drift detection and reproducibility.

  input_refs:
    type: array
    description: >
      Ordered list of relative paths to artifacts that were read as input.
      Provides a complete traceability chain back to the original idea.
    items:
      type: string

  payload:
    type: object
    description: >
      Agent-specific typed payload. See the corresponding payload schema for field definitions.
