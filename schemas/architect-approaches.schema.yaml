$schema: "http://json-schema.org/draft-07/schema#"
$id: "https://github.com/vitualizz/ai-software-delivery-team/schemas/architect-approaches.schema.yaml"
title: ArchitectApproaches
description: >
  Intermediate artifact produced by the Architect specialist's evaluate-approaches step.
  Carried inside an ArtifactEnvelope under .asdt/artifacts/{change}/architect/approaches.yaml.
type: object

required:
  - approaches
  - recommended

properties:
  approaches:
    type: array
    description: Technical approaches evaluated against the constraints analysis.
    minItems: 2
    items:
      type: object
      required:
        - name
        - summary
        - pros
        - cons
        - constraints_fit
      properties:
        name:
          type: string
          description: Short name for this approach (e.g. "Event-driven microservices").
        summary:
          type: string
          description: One-paragraph description of the approach.
        pros:
          type: array
          items:
            type: string
        cons:
          type: array
          items:
            type: string
        constraints_fit:
          type: string
          description: How well this approach satisfies the hard and soft constraints.
          enum: [full, partial, poor]

  recommended:
    type: string
    description: Name of the recommended approach (must match one entry in approaches[].name).

  recommendation_rationale:
    type: string
    description: Why the recommended approach wins over the alternatives.
