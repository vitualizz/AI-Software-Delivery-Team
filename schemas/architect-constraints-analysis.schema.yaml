$schema: "http://json-schema.org/draft-07/schema#"
$id: "https://github.com/vitualizz/ai-software-delivery-team/schemas/architect-constraints-analysis.schema.yaml"
title: ArchitectConstraintsAnalysis
description: >
  Intermediate artifact produced by the Architect specialist's load-constraints step.
  Carried inside an ArtifactEnvelope under .asdt/artifacts/{change}/architect/constraints-analysis.yaml.
type: object

required:
  - hard_constraints
  - soft_constraints

properties:
  hard_constraints:
    type: array
    description: Non-negotiable constraints — violating any of these makes the solution invalid.
    items:
      type: object
      required:
        - constraint
        - source
      properties:
        constraint:
          type: string
          description: The constraint stated as an imperative (e.g. "Must run on-premise").
        source:
          type: string
          description: Where this constraint originates (spec section, stakeholder, regulation).

  soft_constraints:
    type: array
    description: Preferences and quality goals — important but tradeable under justified conditions.
    items:
      type: object
      required:
        - constraint
      properties:
        constraint:
          type: string
        priority:
          type: string
          enum: [high, medium, low]

  platform_summary:
    type: string
    description: Brief summary of the platform context relevant to these constraints.

  open_questions:
    type: array
    description: Unresolved constraint ambiguities that need clarification before design.
    items:
      type: string
