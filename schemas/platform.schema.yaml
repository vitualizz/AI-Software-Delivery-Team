# DOCUMENTATION ONLY — This schema describes the expected structure of mem_save content.
# Artifacts are NOT written to the filesystem during specialist execution.
# Use mem_save with this structure as the content shape.
# JSON Schema (draft-07) for the Platform knowledge artifact.
$schema: "http://json-schema.org/draft-07/schema#"
$id: "https://github.com/vitualizz/ai-software-delivery-team/schemas/platform.schema.yaml"
title: Platform
description: >
  Describes the detected technology stack and project conventions.
  Produced by the Knowledge Detector and consumed by downstream agents
  for context-aware code generation.
type: object

required:
  - schema_version
  - detected_stack
  - conventions
  - design_fingerprint
  - scanned_at

properties:
  schema_version:
    type: string
    description: Version of this platform schema.
    example: "1"

  detected_stack:
    type: array
    description: >
      List of detected technology stack identifiers (e.g. go, node, python, rust).
      Empty array when no recognized markers are found — MUST NOT halt the pipeline.
    items:
      type: string

  conventions:
    type: object
    description: >
      Detected project conventions (naming, structure, etc.) keyed by convention name.
    additionalProperties:
      type: string

  design_fingerprint:
    type: object
    description: >
      Structural fingerprint of the project design (e.g. module names, test patterns).
    additionalProperties: true

  scanned_at:
    type: string
    format: date-time
    description: ISO 8601 timestamp of when this scan was performed.

  package_manager:
    type: string
    description: Detected package manager (e.g. npm, yarn, pnpm, go modules, pip, cargo).

  test_framework:
    type: string
    description: Detected test framework (e.g. jest, go test, pytest, cargo test).

  lint_config:
    type: string
    description: Detected lint configuration file path (e.g. .eslintrc, .golangci.yml).

  component_library:
    type: string
    description: Detected UI component library if applicable (e.g. shadcn, mui, radix).
